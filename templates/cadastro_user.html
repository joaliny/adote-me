<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastro - Adote-me</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastro_user.css') }}">
</head>

<body>

    <div class="left-side">
        <!-- atualize o caminho do logo se necessário -->
        <img src="{{ url_for('static', filename='imagens/logo-adote-me.png') }}" alt="Logo Adote-me">
    </div>

    <div class="right-side">
        <div class="register-box">
            <h2>Criar Conta</h2>

            <form method="POST" action="{{ url_for('cadastrar_usuario') }}">
                <h4>Dados Pessoais</h4>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="nome">Nome Completo *</label>
                        <input id="nome" name="nome" class="form-control" type="text" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="email">E-mail *</label>
                        <input id="email" name="email" class="form-control" type="email" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="telefone">Telefone *</label>
                        <input id="telefone" name="telefone" class="form-control" type="tel" required>
                    </div>

                    <div class="mb-3">
                        <label for="tipo_conta" class="form-label">Tipo de Cadastro:</label>
                        <select id="tipo_conta" name="tipo_conta" class="form-select" onchange="toggleCnpjCpf()" required>
                            <option value="adotante">Pessoa Física (Quero Adotar)</option>
                            <option value="protetor">Protetor Individual</option>
                            <option value="ong">ONG / Instituição</option>
                        </select>
                     </div>

                    <div class="mb-3" id="cpf-group">
                        <label for="cpf" class="form-label">CPF (Obrigatório):</label>
                        <input type="text" id="cpf" name="cpf" class="form-control" placeholder="000.000.000-00" maxlength="14" required>
                    </div>

                    <div class="mb-3" id="cnpj-group" style="display:none;">
                        <label for="cnpj" class="form-label">CNPJ (Obrigatório para ONG):</label>
                        <input type="text" id="cnpj" name="cnpj" class="form-control" placeholder="00.000.000/0000-00" maxlength="18">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="senha">Senha *</label>
                        <input id="senha" name="senha" class="form-control" type="password" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="confirmar_senha">Confirmar Senha *</label>
                        <input id="confirmar_senha" name="confirmar_senha" class="form-control" type="password"
                            required>
                    </div>
                </div>

                <h4 class="mt-4">Endereço</h4>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="cep">CEP</label>
                        <input id="cep" name="cep" class="form-control" type="text">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="cidade">Cidade</label>
                        <input id="cidade" name="cidade" class="form-control" type="text">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label" for="endereco">Endereço</label>
                        <input id="endereco" name="endereco" class="form-control" type="text">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="numero">Número</label>
                        <input id="numero" name="numero" class="form-control" type="text">
                    </div>
                </div>

                <!-- <div class="form-check mt-3">
                    <input class="form-check-input" type="checkbox" id="protetor" name="protetor">
                    <label class="form-check-label" for="protetor">Sou protetor/representante de ONG</label>
                </div>

                <div id="campos-protetor" style="display:none; margin-top:12px;">
                    <h5>Dados da Organização</h5>
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label" for="nome_organizacao">Nome da Organização/ONG</label>
                            <input id="nome_organizacao" name="nome_organizacao" class="form-control" type="text">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" for="cnpj">CNPJ (opcional)</label>
                            <input id="cnpj" name="cnpj" class="form-control" type="text">
                        </div>
                    </div>
                </div> -->

                <div class="form-check mt-3">
                    <input class="form-check-input" type="checkbox" id="termos" name="termos" required>
                    <label class="form-check-label" for="termos">
                        Concordo com os <a href="/termos" target="_blank">Termos de Uso</a> e <a href="/privacidade"
                            target="_blank">Política de Privacidade</a> *
                    </label>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Criar Conta</button>
                </div>

                <div class="text-center mt-3">
                    <p>Já tem uma conta? <a href="/login">Faça login aqui</a></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const checkbox = document.getElementById('protetor');
            const campos = document.getElementById('campos-protetor');
            if (checkbox) {
                checkbox.addEventListener('change', () => {
                    campos.style.display = checkbox.checked ? 'block' : 'none';
                });
            }

            // máscaras simples (opcional)
            const telInput = document.getElementById('telefone');
            if (telInput) {
                telInput.addEventListener('input', function (e) {
                    let v = e.target.value.replace(/\D/g, '');
                    if (v.length > 11) v = v.slice(0, 11);
                    v = v.replace(/^(\d{2})(\d)/, "($1) $2");
                    v = v.replace(/(\d{5})(\d)/, "$1-$2");
                    e.target.value = v;
                });
            }

            const cepInput = document.getElementById('cep');
            if (cepInput) {
                cepInput.addEventListener('input', function (e) {
                    let v = e.target.value.replace(/\D/g, '');
                    if (v.length > 8) v = v.slice(0, 8);
                    v = v.replace(/(\d{5})(\d)/, '$1-$2');
                    e.target.value = v;
                });
            }
        });

        // Função para mostrar/ocultar campos
    function toggleCnpjCpf() {
        const tipo = document.getElementById('tipo_conta').value;
        const cpfGroup = document.getElementById('cpf-group');
        const cnpjGroup = document.getElementById('cnpj-group');
        const cnpjInput = document.getElementById('cnpj');
        const cpfInput = document.getElementById('cpf');

        if (tipo === 'ong') {
            cpfGroup.style.display = 'none';
            cnpjGroup.style.display = 'block';
            cnpjInput.setAttribute('required', 'required');
            cpfInput.removeAttribute('required');
        } else {
            cpfGroup.style.display = 'block';
            cnpjGroup.style.display = 'none';
            cpfInput.setAttribute('required', 'required');
            cnpjInput.removeAttribute('required');
        }
    }

        //Logica do CPF
        document.getElementById('cpf').addEventListener('input', function (e) {
        var value = e.target.value.replace(/\D/g, ''); // Remove tudo que não é dígito
        var cpf = '';
        if (value.length > 9) {
            cpf = value.substring(0, 3) + '.' + value.substring(3, 6) + '.' + value.substring(6, 9) + '-' + value.substring(9, 11);
        } else if (value.length > 6) {
            cpf = value.substring(0, 3) + '.' + value.substring(3, 6) + '.' + value.substring(6, 9);
        } else if (value.length > 3) {
            cpf = value.substring(0, 3) + '.' + value.substring(3, 6);
        } else {
            cpf = value;
        }
        e.target.value = cpf;
    });

    window.onload = function() {
        toggleCnpjCpf();
    };

    </script>
</body>

</html>
